{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block page_title %}Change Your Password{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 2rem auto;">
    <div class="card">
        <div class="card__body">
            <div class="alert alert--info" style="margin-bottom: 1.5rem;">
                <strong>First-time login!</strong> You must change your password before continuing.
            </div>

            {% if error %}
            <div class="alert alert--error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/force-password-change">
                <div class="form-group">
                    <label class="form-label" for="current_password">Current Password</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="password" id="current_password" name="current_password" class="form-input" required style="flex:1;">
                        <button type="button" class="btn btn-ghost btn-sm" onclick="togglePassword('current_password', this)">Show</button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="new_password">New Password</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="password" id="new_password" name="new_password" class="form-input" minlength="8" required style="flex:1;">
                        <button type="button" class="btn btn-ghost btn-sm" onclick="togglePassword('new_password', this)">Show</button>
                    </div>
                    <p class="text-xs text-muted mt-2">Minimum 8 characters</p>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirm_password">Confirm New Password</label>
                    <div style="display: flex; gap: 0.5rem;">
                        <input type="password" id="confirm_password" name="confirm_password" class="form-input" required style="flex:1;">
                        <button type="button" class="btn btn-ghost btn-sm" onclick="togglePassword('confirm_password', this)">Show</button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Update Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
